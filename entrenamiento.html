<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Brandon Fitness — Entrenamiento</title>
<style>
  :root{
    --bg:#121213;
    --panel:#1B1B1D;
    --white:#F3F2EE;
    --muted:#8C8B87;
    --red:#D62828;
    --line:#302F2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--white);
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:32px 16px;text-align:center;
  }
  .brand{
    font-size:34px;font-weight:900;letter-spacing:-.5px;text-transform:uppercase;
    line-height:.9;margin:0 0 30px;font-family:'Arial Narrow','Helvetica Neue',sans-serif;
  }
  .brand span{color:var(--red);}
  .box{
    background:var(--panel);border:1px solid var(--line);
    padding:40px 30px;max-width:480px;
  }
  .box h2{
    text-transform:uppercase;letter-spacing:1.5px;font-size:18px;margin:0 0 14px;
  }
  .box p{color:var(--muted);font-size:14px;line-height:1.6;margin:0;}
  a.back{
    margin-top:24px;color:var(--muted);font-size:12px;text-transform:uppercase;
    letter-spacing:1px;text-decoration:none;
  }
  a.back:hover{color:var(--red);}
</style>
</head>
<body>
  <h1 class="brand">BRANDON<span>FITNESS</span></h1>
  <div class="box">
    <h2>Entrenamiento — Próximamente</h2>
    <p>Estamos terminando de grabar los 3 niveles de entrenamiento (principiante, intermedio y avanzado). Muy pronto vas a poder acceder aquí mismo.</p>
  </div>
  <a class="back" href="index.html">← Volver</a>
</body>
</html>
