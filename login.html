<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brandon Fitness — Ingresar</title>
<style>
  :root{
    --bg:#121213;
    --panel:#1B1B1D;
    --white:#F3F2EE;
    --muted:#8C8B87;
    --red:#D62828;
    --line:#302F2E;
    --ok:#3F8F5F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--white);
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:32px 16px;
  }
  .brand{
    font-size:42px;font-weight:900;letter-spacing:-.5px;text-transform:uppercase;
    line-height:.9;margin:0 0 34px;font-family:'Arial Narrow','Helvetica Neue',sans-serif;
    text-align:center;
  }
  .brand span{color:var(--red);}
  .box{
    background:var(--panel);border:1px solid var(--line);
    padding:38px 34px;max-width:420px;width:100%;
  }
  .tabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--line);}
  .tab{
    flex:1;text-align:center;padding:10px;cursor:pointer;
    text-transform:uppercase;font-size:12px;letter-spacing:1px;font-weight:700;
    color:var(--muted);border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--white);border-bottom-color:var(--red);}
  label{
    display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);font-weight:700;margin:14px 0 5px;
  }
  input{
    width:100%;padding:12px;font-size:16px;font-family:inherit;
    background:var(--bg);border:1px solid var(--line);color:var(--white);
  }
  input:focus{outline:none;border-color:var(--red);}
  button{
    margin-top:24px;width:100%;padding:15px;
    background:var(--red);color:var(--white);border:none;
    text-transform:uppercase;font-weight:800;letter-spacing:1.5px;
    font-size:14px;cursor:pointer;
  }
  button:hover{background:#B01F1F;}
  button:disabled{background:var(--line);cursor:not-allowed;}
  .msg{
    margin-top:16px;font-size:13px;padding:10px;text-align:center;display:none;
  }
  .msg.error{background:rgba(214,40,40,0.15);color:#FF6B6B;display:block;}
  .msg.success{background:rgba(63,143,95,0.15);color:#6FCB8F;display:block;}
  a.back{
    margin-top:20px;color:var(--muted);font-size:12px;text-transform:uppercase;
    letter-spacing:1px;text-decoration:none;
  }
  a.back:hover{color:var(--red);}
</style>
</head>
<body>

  <h1 class="brand">BRANDON<span>FITNESS</span></h1>

  <div class="box">
    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="cambiarTab('login')">Ingresar</div>
      <div class="tab" id="tab-signup" onclick="cambiarTab('signup')">Crear cuenta</div>
    </div>

    <form id="form-login">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" required>
      <label>Contraseña</label>
      <input type="password" id="login-password" required>
      <button type="submit">Ingresar</button>
    </form>

    <form id="form-signup" style="display:none;">
      <label>Correo electrónico</label>
      <input type="email" id="signup-email" required>
      <label>Contraseña (mínimo 6 caracteres)</label>
      <input type="password" id="signup-password" required minlength="6">
      <button type="submit">Crear cuenta</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <a class="back" href="index.html">← Volver</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://whoccrkzlxptyguxrmyo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_RQ2-3A4ND695RLJb29mGLg_c_qxXNqi';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function cambiarTab(tab){
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    ocultarMensaje();
  }

  function mostrarMensaje(texto, tipo){
    const msg = document.getElementById('msg');
    msg.textContent = texto;
    msg.className = 'msg ' + tipo;
  }
  function ocultarMensaje(){
    const msg = document.getElementById('msg');
    msg.className = 'msg';
  }

  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    ocultarMensaje();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if(error){
      mostrarMensaje('Error: ' + error.message, 'error');
    } else {
      mostrarMensaje('¡Bienvenido! Redirigiendo...', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    }
  });

  document.getElementById('form-signup').addEventListener('submit', async (e) => {
    e.preventDefault();
    ocultarMensaje();
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    const { data, error } = await sb.auth.signUp({ email, password });

    if(error){
      mostrarMensaje('Error: ' + error.message, 'error');
    } else {
      mostrarMensaje('Cuenta creada. Revisá tu correo para confirmar antes de ingresar.', 'success');
    }
  });
</script>

</body>
</html>
